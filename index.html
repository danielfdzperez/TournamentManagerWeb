<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Avanzado de Torneos Round Robin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-container">
    <h1>🏆 Gestor de Torneos Competitivos</h1>
    <button class="btn-new-tournament" id="btnNewTournament" onclick="confirmarNuevoTorneo()" style="display:none;">Nuevo Torneo</button>
</div>

<div class="container">
    <div id="phase1" class="phase active">
        <h2>Fase 1: Configuración del Torneo</h2>
        <div class="form-group">
            <label for="playersInput">Introduce los Participantes (uno por línea):</label>
            <textarea id="playersInput" placeholder="Jugador A&#10;Jugador B&#10;Jugador C..."></textarea>
        </div>
        <div class="form-group">
            <label for="sizeInput">Cantidad de jugadores por partida:</label>
            <input type="number" id="sizeInput" value="4" min="2">
            <div id="errorMsg" class="error"></div>
        </div>
        <button class="btn-primary" onclick="inicializarTorneo()">Generar Encuentros e Ir al Torneo</button>
    </div>

    <div id="phase2" class="phase">
        <div class="tournament-layout">
            <div>
                <h3 class="column-title">Encuentros Calculados</h3>
                <div id="matchesList" class="matches-list"></div>
            </div>
            <div>
                <h3 class="column-title">Clasificación</h3>
                <div style="overflow-x: auto;">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Nombre (Editable)</th>
                                <th>Puntos</th>
                                <th>1º</th>
                                <th>2º</th>
                                <th>3º</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>
                </div>
                <button class="btn-success-action" onclick="finalizarTorneoYMostrarPodio()">🏁 Finalizar Torneo y Ver Podio</button>
            </div>
        </div>
    </div>
</div>

<div id="scoreModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modalMatchTitle" class="modal-title">Puntuación de la Partida</h3>
        <div class="modal-row" style="font-weight: 600; font-size: 12px; color: var(--text-muted);">
            <div>Jugador</div>
            <div>Puntos</div>
            <div>Posición</div>
        </div>
        <div id="modalPlayersContainer"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-save" onclick="saveScores()">Guardar Resultados</button>
        </div>
    </div>
</div>

<div id="podiumModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 550px; text-align: center;">
        <h3 class="modal-title" style="font-size: 24px; margin-bottom: 5px;">🎉 ¡Torneo Finalizado! 🎉</h3>
        <p style="color: var(--text-muted); margin: 0; font-size: 14px;">Cuadro de honor oficial de la competición</p>
        
        <div id="podiumContainer" class="podium-wrapper"></div>
        
        <div class="modal-actions" style="justify-content: center; margin-top: 25px;">
            <button class="btn-cancel" style="background: var(--primary); color: white; padding: 10px 24px;" onclick="closePodiumModal()">Cerrar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
